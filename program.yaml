days:

  1:
    events:

      - id: welcome
        delay_minutes: 0
        type: text
        text: |
          Привет.

          Это не просто курс "про жопу".
          Это про тело, силу и ощущение себя.

      - id: about_course
        delay_minutes: 1
        type: text
        text: |
          Как это работает:

          Каждый день ты будешь получать:
          — короткие сообщения
          — задания
          — тренировки

          Твоя задача — не идеально.
          А регулярно.

      - id: how_to_train
        delay_minutes: 2
        type: text
        text: |
          Как тренироваться:

          Лучше сделать немного, чем не сделать идеально.

          Здесь важна регулярность и внимание к телу.

      - id: main_training
        delay_minutes: 3
        type: video
        file_id: "BAACAgIAAxkBAAOKac53Jd1gnOLG_JkikRPAgFP4F5wAAquTAAK9MnBKDu2pY0n34o86BA"
        caption: |
          Это основная тренировка.

      - id: short_training
        delay_minutes: 4
        type: video
        file_id: "BAACAgIAAxkBAAOOac53OOYfmZvwJ8DCx_rgFpbhS1MAArOTAAK9MnBK-zSym7rp_g06BA"
        caption: |
          Это короткая версия.

      - id: pin_message
        delay_minutes: 5
        type: text
        text: |
          Закрепи эти видео.

          Ты будешь возвращаться к ним каждый день.

      - id: evening
        time: "21:00"
        type: text
        text: |
          Завтра начинаем.

          Перед сном просто обрати внимание на тело.
          Почувствуй его.

---

  2:
    events:

      - id: morning
        time: "09:00"
        type: text
        text: |
          Доброе утро.

          Сегодня начинаем.

          Мини-задание:
          обрати внимание, как ты чувствуешь своё тело.

      - id: training
        time: "12:00"
        type: text
        text: |
          Сегодня короткая тренировка.

      - id: check
        time: "21:00"
        type: buttons
        text: "Сделала сегодня тренировку?"
        buttons:
          - text: "Да"
            action: "done"
          - text: "Нет"
            action: "not_done"

---

  3:
    events:

      - id: morning
        time: "09:00"
        type: text
        text: |
          Новый день.

          Мини-задание:
          попробуй не критиковать своё тело сегодня.

      - id: training
        time: "12:00"
        type: text
        text: |
          Сегодня тоже короткая тренировка.

      - id: check
        time: "21:00"
        type: buttons
        text: "Получилось сделать?"
        buttons:
          - text: "Да"
            action: "done"
          - text: "Нет"
            action: "not_done"

---

  4:
    events:

      - id: morning
        time: "09:00"
        type: text
        text: |
          Сегодня возвращаем длинную тренировку.

          Мини-задание:
          почувствуй силу в теле.

      - id: training
        time: "12:00"
        type: text
        text: |
          Сегодня основная тренировка.

      - id: check
        time: "21:00"
        type: buttons
        text: "Как сегодня?"
        buttons:
          - text: "Сделала"
            action: "done"
          - text: "Нет"
            action: "not_done"

---

actions:

  done:
    response:
      type: text
      text: |
        Красиво.

        Именно так строится результат.

  not_done:
    response:
      type: text
      text: |
        Ничего страшного.

        Просто возвращайся завтра.
